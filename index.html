<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberAIStep Project Plan</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2d3140;
  --text: #e8e9ed;
  --text2: #9ca0ad;
  --accent: #3b82f6;
  --accent-dim: #1e3a5f;
  --green: #22c55e;
  --green-dim: #14532d;
  --orange: #f59e0b;
  --orange-dim: #78350f;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --purple: #a855f7;
  --purple-dim: #3b0764;
  --cyan: #06b6d4;
  --cyan-dim: #083344;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}

h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 20px; }

.stats-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}

.stat-num { font-size: 1.4rem; font-weight: 700; }
.stat-label { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.78rem;
  transition: all 0.15s;
}

.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.filter-btn:hover { border-color: var(--accent); }

.workstream {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}

.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
}

.ws-header:hover { background: var(--surface2); }
.ws-left { display: flex; align-items: center; gap: 10px; }
.ws-icon { font-size: 1.1rem; }
.ws-title { font-weight: 600; font-size: 0.92rem; }

.ws-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text2);
}

.progress-bar { width: 70px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

.ws-body { padding: 0 16px 12px; }

.phase-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  padding: 10px 0 6px;
  border-bottom: 1px dashed var(--border);
  margin-bottom: 4px;
  font-weight: 600;
}

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}

.task-item:last-child { border-bottom: none; }

.task-check {
  width: 19px;
  height: 19px;
  border: 2px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.task-check:hover { border-color: var(--accent); }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-check.done::after { content: '\2713'; color: white; font-size: 11px; font-weight: 700; }

.task-content { flex: 1; }
.task-name { font-size: 0.88rem; }
.task-name.done { text-decoration: line-through; color: var(--text2); }
.task-detail { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
.task-tags { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }

.tag {
  font-size: 0.62rem;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.tag-urgent { background: var(--red-dim); color: var(--red); }
.tag-this-week { background: var(--orange-dim); color: var(--orange); }
.tag-next-week { background: var(--accent-dim); color: var(--accent); }
.tag-ongoing { background: var(--purple-dim); color: var(--purple); }
.tag-done { background: var(--green-dim); color: var(--green); }
.tag-blind-spot { background: #4a1942; color: #e879f9; }
.tag-red-flag { background: var(--red-dim); color: #fca5a5; border: 1px solid var(--red); }
.tag-scale { background: var(--cyan-dim); color: var(--cyan); }
.tag-month-2 { background: #1a2332; color: #60a5fa; }
.tag-month-3 { background: #1a2332; color: #818cf8; }
.tag-q3 { background: #1a1a2e; color: #c084fc; }

.chevron { transition: transform 0.2s; color: var(--text2); font-size: 0.75rem; }
.chevron.open { transform: rotate(90deg); }

.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  font-size: 0.72rem;
  color: var(--text2);
}

.legend-item { display: flex; align-items: center; gap: 4px; }

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
  .progress-bar { width: 45px; }
  body { padding: 12px; }
  .legend { gap: 6px; }
}
</style>
</head>

        { id: 'o9', name: 'Create emergency contact + medical procedure', detail: 'What if a child has a medical emergency? Written procedure, nearest A&E, emergency contacts collected at registration.', tags: ['urgent', 'blind-spot', 'red-flag'], done: false, phase: 'now' },
        { id: 'o10', name: 'Set up simple bookkeeping tracker', detail: 'Track income (ClassForKids payouts), expenses (room, insurance, ads, materials). Needed for tax + grants. Google Sheet is fine.', tags: ['this-week', 'blind-spot'], done: false, phase: 'now' },
        { id: 'o12', name: 'Optimise ClassForKids listing', detail: 'Professional photos, full description, all blocks listed, correct pricing, compelling copy. This is your shopfront.', tags: ['this-week'], done: false, phase: 'now' },
        { id: 'o11', name: 'Plan backup instructor cover', detail: 'Identify 1 person who could cover if you\'re ill. Even a simplified session plan + "class cancelled" policy.', tags: ['next-week', 'blind-spot'], done: false, phase: 'next' },
        { id: 'o13', name: 'Set up retention tracking', detail: 'Who returns for Block 2? Who drops? Why? 55%+ = healthy, <40% = investigate. Simple spreadsheet.', tags: ['next-week'], done: false, phase: 'next' },
        { id: 'o14', name: 'Create parent feedback survey (end of Block 1)', detail: 'Google Form: 5 questions. What they liked, what to improve, would they recommend, what topics next. Data for decisions.', tags: ['next-week', 'blind-spot'], done: false, phase: 'next' },
        { id: 'o20', name: 'Write standard operating procedures (SOPs)', detail: 'Session setup, student onboarding, parent comms templates, incident report form. Must exist before hiring anyone.', tags: ['scale', 'month-2'], done: false, phase: 'scale' },
        { id: 'o23', name: 'Open second class slot (different day/time)', detail: 'Saturday morning + weekday evening. Doubles capacity without doubling fixed costs.', tags: ['scale', 'month-2'], done: false, phase: 'scale' },
        { id: 'o25', name: 'Create 12-month financial forecast', detail: 'Project: students \u00D7 pricing \u00D7 retention \u2212 costs. Needed for grant applications and planning.', tags: ['scale', 'month-2'], done: false, phase: 'scale' },
        { id: 'o21', name: 'Hire first teaching assistant', detail: 'When class regularly hits 8+. DBS-checked. Frees you to manage and grow, not just teach.', tags: ['scale', 'month-3'], done: false, phase: 'scale' },
        { id: 'o22', name: 'Create TA training pack', detail: 'Session structure, tier system, common pitfalls, behaviour management, safeguarding basics.', tags: ['scale', 'month-3'], done: false, phase: 'scale' },
        { id: 'o24', name: 'Scout second venue location', detail: 'Different Leicester area for new catchment. Community centres, school halls, libraries.', tags: ['scale', 'q3'], done: false, phase: 'scale' },
        { id: 'o26', name: 'Consider Ltd company registration', detail: 'When revenue grows. Ltd offers liability protection, looks professional for B2B, and has tax advantages.', tags: ['scale', 'q3', 'blind-spot'], done: false, phase: 'scale' },
        { id: 'o27', name: 'Set up quarterly business review process', detail: 'Every 3 months: students, revenue, retention, marketing ROI, curriculum progress. 1 hour, non-negotiable.', tags: ['scale', 'month-3'], done: false, phase: 'scale' },
        { id: 'o28', name: 'Create waiting list system', detail: 'When classes fill, capture demand. ClassForKids may support this \u2014 or use a simple Google Form. Waiting list = social proof + demand signal.', tags: ['scale', 'month-2', 'blind-spot'], done: false, phase: 'scale' },
      ]
    }
  ]
};

let completedTasks = {};
let openWorkstreams = { compliance: true };
let activeFilter = 'all';

try {
  const saved = localStorage.getItem('cyberaistep_plan_v3');
  if (saved) {
    const parsed = JSON.parse(saved);
    completedTasks = parsed.completedTasks || {};
    openWorkstreams = parsed.openWorkstreams || { compliance: true };
  }
} catch(e) {}

DATA.workstreams.forEach(ws => {
  ws.tasks.forEach(t => {
    if (completedTasks[t.id] !== undefined) t.done = completedTasks[t.id];
  });
});

function saveState() {
  DATA.workstreams.forEach(ws => { ws.tasks.forEach(t => { completedTasks[t.id] = t.done; }); });
  try { localStorage.setItem('cyberaistep_plan_v3', JSON.stringify({ completedTasks, openWorkstreams })); } catch(e) {}
}

function getStats() {
  let total=0, done=0, urgent=0, blindSpots=0, scale=0;
  DATA.workstreams.forEach(ws => ws.tasks.forEach(t => {
    total++;
    if (t.done) done++;
    if (!t.done && t.tags.includes('urgent')) urgent++;
    if (!t.done && t.tags.includes('blind-spot')) blindSpots++;
    if (!t.done && t.tags.includes('scale')) scale++;
  }));
  return { total, done, urgent, blindSpots, scale, pct: total ? Math.round((done/total)*100) : 0 };
}

function renderStats() {
  const s = getStats();
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${s.done}/${s.total}</div><div class="stat-label">Done</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${s.pct}%</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${s.urgent}</div><div class="stat-label">Urgent</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#e879f9">${s.blindSpots}</div><div class="stat-label">Blind Spots</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--cyan)">${s.scale}</div><div class="stat-label">Growth</div></div>
  `;
}

function renderFilters() {
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'urgent', label: '\uD83D\uDD34 Urgent' },
    { key: 'this-week', label: '\uD83D\uDFE1 This Week' },
    { key: 'next-week', label: '\uD83D\uDD35 Next Week' },
    { key: 'blind-spot', label: '\uD83D\uDFE3 Blind Spots' },
    { key: 'red-flag', label: '\uD83D\uDEA9 Red Flags' },
    { key: 'scale', label: '\uD83D\uDE80 Growth' },
    { key: 'ongoing', label: '\uD83D\uDD01 Ongoing' },
    { key: 'todo', label: 'To Do' },
    { key: 'done', label: '\u2713 Done' },
  ];
  document.getElementById('filters').innerHTML = filters.map(f =>
    `<button class="filter-btn ${activeFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function setFilter(key) { activeFilter = key; renderFilters(); renderWorkstreams(); }

function taskMatchesFilter(t) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'todo') return !t.done;
  if (activeFilter === 'done') return t.done;
  return t.tags.includes(activeFilter) && !t.done;
}

function renderWorkstreams() {
  const container = document.getElementById('workstreams');
  container.innerHTML = DATA.workstreams.map(ws => {
    const filtered = ws.tasks.filter(taskMatchesFilter);
    if (filtered.length === 0 && activeFilter !== 'all') return '';
    const done = ws.tasks.filter(t => t.done).length;
    const total = ws.tasks.length;
    const pct = Math.round((done/total)*100);
    const isOpen = openWorkstreams[ws.id];
    const tasks = activeFilter === 'all' ? ws.tasks : filtered;
    const phases = { done: [], now: [], next: [], scale: [] };
    tasks.forEach(t => { if (phases[t.phase]) phases[t.phase].push(t); });
    const phaseLabels = { done: '\u2705 Completed', now: '\u26A1 Do Now', next: '\uD83D\uDCC5 Up Next', scale: '\uD83D\uDE80 Growth & Scale' };
    let bodyHTML = '';
    for (const [phase, items] of Object.entries(phases)) {
      if (items.length === 0) continue;
      bodyHTML += '<div class="phase-label">' + phaseLabels[phase] + '</div>';
      bodyHTML += items.map(t => `
        <div class="task-item">
          <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${ws.id}','${t.id}')"></div>
          <div class="task-content">
            <div class="task-name ${t.done?'done':''}">${t.name}</div>
            ${t.detail ? '<div class="task-detail">'+t.detail+'</div>' : ''}
            <div class="task-tags">${t.tags.map(tag => '<span class="tag tag-'+tag+'">'+tag.replace(/-/g,' ')+'</span>').join('')}</div>
          </div>
        </div>
      `).join('');
    }
    return `
      <div class="workstream">
        <div class="ws-header" onclick="toggleWs('${ws.id}')">
          <div class="ws-left">
            <span class="ws-icon">${ws.icon}</span>
            <span class="ws-title">${ws.title}</span>
          </div>
          <div class="ws-progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${ws.color}"></div></div>
            <span>${done}/${total}</span>
            <span class="chevron ${isOpen?'open':''}">&#9654;</span>
          </div>
        </div>
        ${isOpen ? '<div class="ws-body">'+bodyHTML+'</div>' : ''}
      </div>
    `;
  }).join('');
}

function toggleWs(id) { openWorkstreams[id] = !openWorkstreams[id]; saveState(); renderWorkstreams(); }
function toggleTask(wsId, taskId) {
  const ws = DATA.workstreams.find(w => w.id === wsId);
  const task = ws.tasks.find(t => t.id === taskId);
  task.done = !task.done;
  saveState(); renderStats(); renderWorkstreams();
}

renderStats(); renderFilters(); renderWorkstreams();
</script>
</body>
</html>
