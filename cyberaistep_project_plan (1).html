<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberAIStep — Daily Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2d3140;
  --text: #e8e9ed;
  --text2: #9ca0ad;
  --text3: #6b7080;
  --accent: #3b82f6;
  --accent-dim: #1e3a5f;
  --green: #22c55e;
  --green-dim: #14532d;
  --orange: #f59e0b;
  --orange-dim: #78350f;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --purple: #a855f7;
  --purple-dim: #3b0764;
  --cyan: #06b6d4;
  --cyan-dim: #083344;
}
[data-theme="light"] {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #eef0f5;
  --border: #d1d5db;
  --text: #111827;
  --text2: #4b5563;
  --text3: #9ca3af;
  --accent: #2563eb;
  --accent-dim: #dbeafe;
  --green: #16a34a;
  --green-dim: #dcfce7;
  --orange: #d97706;
  --orange-dim: #fef3c7;
  --red: #dc2626;
  --red-dim: #fee2e2;
  --purple: #9333ea;
  --purple-dim: #f3e8ff;
  --cyan: #0891b2;
  --cyan-dim: #cffafe;
}
* { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.25s, border-color 0.25s, color 0.2s; }
html { font-size: clamp(16px, 1.8vw, 20px); }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: clamp(12px, 3vw, 24px); max-width: 900px; margin: 0 auto; font-size: 1rem; }

/* THEME TOGGLE */
.theme-toggle { margin-left: auto; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 0.85rem; color: var(--text2); display: flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; align-self: center; }
.theme-toggle:hover { border-color: var(--accent); color: var(--text); }

/* TABS */
.tabs { display: flex; gap: 4px; align-items: stretch; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { background: none; border: none; color: var(--text2); padding: 12px 20px; cursor: pointer; font-size: 1rem; font-weight: 600; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }
.tab-badge { background: var(--red); color: white; font-size: 0.7rem; padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-weight: 700; }

/* FOCUS VIEW */
.focus-header { text-align: center; margin-bottom: 24px; }
.focus-date { color: var(--text2); font-size: 1rem; }
.focus-title { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; margin: 6px 0; }
.focus-subtitle { color: var(--text2); font-size: 1rem; }

.streak-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.streak-item { flex: 1; min-width: 90px; }
.streak-item { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; }
.streak-num { font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 700; }
.streak-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.streak-fire { color: var(--orange); }
.streak-total { color: var(--green); }
.streak-week { color: var(--accent); }

.needle-question { background: linear-gradient(135deg, var(--accent-dim), var(--purple-dim)); border: 1px solid var(--accent); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px; font-size: 1.05rem; }
.needle-question strong { color: var(--orange); }

.today-section { margin-bottom: 24px; }
.today-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.today-label .count { background: var(--accent-dim); color: var(--accent); padding: 1px 7px; border-radius: 8px; font-size: 0.7rem; }

.focus-task { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s; }
.focus-task:hover { border-color: var(--accent); }
.focus-task.completed { opacity: 0.5; }

.ft-check { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.ft-check:hover { border-color: var(--green); }
.ft-check:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.ft-check.done { background: var(--green); border-color: var(--green); }
.ft-check.done::after { content: '\2713'; color: white; font-size: 13px; font-weight: 700; }

.ft-content { flex: 1; }
.ft-name { font-size: 1.05rem; font-weight: 600; }
.ft-name.done { text-decoration: line-through; color: var(--text2); }
.ft-detail { font-size: 0.9rem; color: var(--text2); margin-top: 4px; }
.ft-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

.impact-tag { font-size: 0.72rem; padding: 3px 9px; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.impact-students { background: var(--green-dim); color: var(--green); }
.impact-quality { background: var(--accent-dim); color: var(--accent); }
.impact-scale { background: var(--cyan-dim); color: var(--cyan); }
.impact-protect { background: var(--red-dim); color: var(--red); }
.impact-ws { background: var(--surface2); color: var(--text2); }

.all-done-msg { text-align: center; padding: 40px 20px; background: var(--surface); border: 1px solid var(--green-dim); border-radius: 12px; margin-bottom: 20px; }
.all-done-msg .emoji { font-size: 2.5rem; margin-bottom: 8px; }
.all-done-msg .title { font-size: 1.1rem; font-weight: 700; color: var(--green); }
.all-done-msg .sub { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }

/* FULL PLAN VIEW */
.ws-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.ws-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
.ws-head:hover { background: var(--surface2); }
.ws-left { display: flex; align-items: center; gap: 10px; }
.ws-icon { font-size: 1.1rem; }
.ws-title { font-weight: 600; font-size: 0.92rem; }
.ws-right { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text2); }
.pbar { width: 60px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.pfill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.chev { transition: transform 0.2s; color: var(--text2); font-size: 0.7rem; }
.chev.open { transform: rotate(90deg); }
.ws-body { padding: 0 16px 12px; }
.phase-hdr { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); padding: 10px 0 4px; border-bottom: 1px dashed var(--border); font-weight: 600; }
.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.task-row:last-child { border-bottom: none; }
.t-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.t-check:hover { border-color: var(--accent); }
.t-check:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.t-check.done { background: var(--green); border-color: var(--green); }
.t-check.done::after { content: '\2713'; color: white; font-size: 10px; font-weight: 700; }
.t-content { flex: 1; }
.t-name { font-size: 0.95rem; }
.t-name.done { text-decoration: line-through; color: var(--text2); }
.t-detail { font-size: 0.82rem; color: var(--text2); margin-top: 3px; }
.t-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.tag { font-size: 0.68rem; padding: 2px 7px; border-radius: 8px; font-weight: 600; text-transform: uppercase; }
.tag-urgent { background: var(--red-dim); color: var(--red); }
.tag-this-week { background: var(--orange-dim); color: var(--orange); }
.tag-next-week { background: var(--accent-dim); color: var(--accent); }
.tag-ongoing { background: var(--purple-dim); color: var(--purple); }
.tag-done { background: var(--green-dim); color: var(--green); }
.tag-blind-spot { background: #4a1942; color: #e879f9; }
.tag-red-flag { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.tag-scale { background: var(--cyan-dim); color: var(--cyan); }
.tag-month-2 { background: #1a2332; color: #60a5fa; }
.tag-month-3 { background: #1a2332; color: #818cf8; }
.tag-q3 { background: #1a1a2e; color: #c084fc; }

/* LIGHT MODE TAG OVERRIDES — hardcoded dark colours don't work on light bg */
[data-theme="light"] .tag-blind-spot { background: #fdf4ff; color: #9333ea; border: 1px solid #d8b4fe; }
[data-theme="light"] .tag-month-2 { background: #dbeafe; color: #1d4ed8; }
[data-theme="light"] .tag-month-3 { background: #e0e7ff; color: #4338ca; }
[data-theme="light"] .tag-q3 { background: #f3e8ff; color: #7c3aed; }

/* PARKING LOT */
.parking-lot { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.pl-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.pl-subtitle { font-size: 0.78rem; color: var(--text2); margin-bottom: 14px; }
.pl-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.pl-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.85rem; outline: none; }
.pl-input:focus { border-color: var(--accent); }
.pl-input::placeholder { color: var(--text3); }
.pl-add-btn { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
.pl-add-btn:hover { background: var(--accent); color: white; }
.pl-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.pl-item:last-child { border-bottom: none; }
.pl-remove { color: var(--text3); cursor: pointer; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; }
.pl-remove:hover { color: var(--red); background: var(--red-dim); }
.pl-empty { color: var(--text3); font-size: 0.8rem; font-style: italic; padding: 8px 0; }
.pl-date { color: var(--text3); font-size: 0.7rem; margin-left: auto; }

.hidden { display: none; }

/* OVERALL PROGRESS BAR */
.overall-progress { margin-bottom: 20px; }
.overall-progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.overall-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width 0.5s ease; }
.overall-progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text3); margin-bottom: 4px; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.fbtn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: 16px; cursor: pointer; font-size: 0.72rem; }
.fbtn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

@media (max-width: 600px) {
  html { font-size: 16px; }
  .streak-bar { gap: 8px; }
  .streak-item { padding: 10px 14px; }
  body { padding: 12px; }
  .focus-title { font-size: 1.5rem; }
  .streak-num { font-size: 1.6rem; }
  .ft-name { font-size: 1rem; }
  .tab { padding: 10px 14px; font-size: 0.95rem; }
}
</style>

const WS_META = {
  compliance: { icon: '\uD83D\uDEE1\uFE0F', title: 'Compliance & Safeguarding', color: '#ef4444' },
  curriculum: { icon: '\uD83D\uDCDA', title: 'Curriculum & Delivery', color: '#3b82f6' },
  marketing:  { icon: '\uD83D\uDCE3', title: 'Marketing & B2C Growth', color: '#f59e0b' },
  b2b:        { icon: '\uD83C\uDFEB', title: 'B2B & Public Sector', color: '#a855f7' },
  ops:        { icon: '\u2699\uFE0F', title: 'Operations & Finance', color: '#22c55e' },
};

const IMPACT_LABELS = {
  students: { label: 'More Students', cls: 'impact-students' },
  quality:  { label: 'Education Quality', cls: 'impact-quality' },
  scale:    { label: 'Scale B2B/B2C', cls: 'impact-scale' },
  protect:  { label: 'Protect Business', cls: 'impact-protect' },
};

const PHASE_LABELS = { done:'\u2705 Completed', now:'\u26A1 Do Now', next:'\uD83D\uDCC5 Up Next', scale:'\uD83D\uDE80 Growth & Scale' };

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = { completed: {}, streak: 0, lastCompleteDate: null, openWs: {}, parkingLot: [], activeTab: 'focus', wsFilter: 'all' };

function load() {
  try {
    const s = localStorage.getItem('cas_v4');
    if (s) { const p = JSON.parse(s); Object.assign(state, p); }
  } catch(e) {}
  TASKS.forEach(t => { if (state.completed[t.id] !== undefined) t.done = state.completed[t.id]; });
  updateStreak();
}

function save() {
  TASKS.forEach(t => { state.completed[t.id] = t.done; });
  try { localStorage.setItem('cas_v4', JSON.stringify(state)); } catch(e) {}
}

function todayStr() { return new Date().toISOString().slice(0,10); }

function updateStreak() {
  const today = todayStr();
  if (state.lastCompleteDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.lastCompleteDate !== yesterday && state.lastCompleteDate !== today) {
    state.streak = 0;
  }
}

function markStreakToday() {
  const today = todayStr();
  if (state.lastCompleteDate !== today) {
    state.streak++;
    state.lastCompleteDate = today;
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
function urgentCount() { return TASKS.filter(t => !t.done && (t.tags.includes('urgent') || t.tags.includes('red-flag'))).length; }

function renderTabs() {
  const uc = urgentCount();
  const tabs = [
    { key: 'focus', label: '\u26A1 Today\'s Focus', badge: uc },
    { key: 'plan', label: '\uD83D\uDCCB Full Plan' },
    { key: 'parking', label: '\uD83C\uDFAF Parking Lot' },
  ];
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.getElementById('tabs').innerHTML =
    tabs.map(t =>
      `<button class="tab ${state.activeTab===t.key?'active':''}" onclick="switchTab('${t.key}')">${t.label}${t.badge?`<span class="tab-badge">${t.badge}</span>`:''}</button>`
    ).join('') +
    `<button class="theme-toggle" onclick="toggleTheme()">${isDark ? '☀️ Light' : '🌙 Dark'}</button>`;
}

function switchTab(key) { state.activeTab = key; save(); render(); }

function render() {
  renderTabs();
  const app = document.getElementById('app');
  if (state.activeTab === 'focus') renderFocus(app);
  else if (state.activeTab === 'plan') renderPlan(app);
  else renderParking(app);
}

function getTodayTasks() {
  return TASKS.filter(t => !t.done && (t.phase === 'now'))
    .sort((a,b) => b.pri - a.pri)
    .slice(0, 5);
}


function renderFocus(el) {
  const todayTasks = getTodayTasks();
  const totalDone = TASKS.filter(t => t.done).length;
  const totalAll = TASKS.length;
  const pct = Math.round((totalDone/totalAll)*100);

  const allTodayDone = todayTasks.length === 0;

  el.innerHTML = `
    <div class="overall-progress">
      <div class="overall-progress-label"><span>Overall progress</span><span>${totalDone} / ${totalAll} tasks &mdash; ${pct}%</span></div>
      <div class="overall-progress-track"><div class="overall-progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="focus-header">
      <div class="focus-date">${new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</div>
      <div class="focus-title">${allTodayDone ? 'All caught up \uD83C\uDF89' : 'What moves the needle today?'}</div>
    </div>

    <div class="streak-bar">
      <div class="streak-item"><div class="streak-num streak-fire">${state.streak}</div><div class="streak-label">\uD83D\uDD25 Day Streak</div></div>
      <div class="streak-item"><div class="streak-num streak-total">${totalDone}</div><div class="streak-label">Total Done</div></div>
      <div class="streak-item"><div class="streak-num streak-week">${TASKS.filter(t=>!t.done&&t.phase==='now').length}</div><div class="streak-label">Remaining Now</div></div>
    </div>

    <div class="needle-question">
      Before starting anything new, ask: <strong>"Does this get me more students, improve education quality, or scale the business?"</strong><br>If not \u2014 park it.
    </div>

    ${allTodayDone ? `
      <div class="all-done-msg">
        <div class="emoji">\uD83D\uDCAA</div>
        <div class="title">All "Do Now" tasks complete</div>
        <div class="sub">Move to the Full Plan tab and pull tasks from "Up Next" into your week. Or rest \u2014 consistency beats intensity.</div>
      </div>
    ` : `
      <div class="today-section">
        <div class="today-label">\u26A1 Your focus today <span class="count">${todayTasks.length} tasks</span></div>
        ${todayTasks.map(t => renderFocusTask(t)).join('')}
      </div>
    `}
  `;
}

function renderFocusTask(t) {
  const ws = WS_META[t.ws];
  return `
    <div class="focus-task ${t.done?'completed':''}">
      <div class="ft-check ${t.done?'done':''}" role="checkbox" aria-checked="${t.done}" tabindex="0" onclick="toggleFocus('${t.id}')" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleFocus('${t.id}')}"></div>
      <div class="ft-content">
        <div class="ft-name ${t.done?'done':''}">${t.name}</div>
        ${t.detail ? `<div class="ft-detail">${t.detail}</div>` : ''}
        <div class="ft-meta">
          <span class="impact-tag impact-ws">${ws.icon} ${ws.title.split(' ')[0]}</span>
          ${t.impact.map(i => IMPACT_LABELS[i] ? `<span class="impact-tag ${IMPACT_LABELS[i].cls}">${IMPACT_LABELS[i].label}</span>` : '').join('')}
          ${t.tags.filter(x=>x!=='done').map(tag => `<span class="tag tag-${tag}">${tag.replace(/-/g,' ')}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function toggleFocus(id) {
  const t = TASKS.find(x => x.id === id);
  t.done = !t.done;
  if (t.done) markStreakToday();
  save(); render();
}

// FULL PLAN
function renderPlan(el) {
  const filters = [
    { key:'all', label:'All' }, { key:'todo', label:'To Do' }, { key:'urgent', label:'\uD83D\uDD34 Urgent' },
    { key:'this-week', label:'\uD83D\uDFE1 This Week' }, { key:'next-week', label:'\uD83D\uDD35 Next' },
    { key:'scale', label:'\uD83D\uDE80 Growth' }, { key:'blind-spot', label:'\uD83D\uDFE3 Blind Spots' },
    { key:'done', label:'\u2713 Done' },
  ];

  let html = `<div class="filter-bar">${filters.map(f =>
    `<button class="fbtn ${state.wsFilter===f.key?'active':''}" onclick="setWsFilter('${f.key}')">${f.label}</button>`
  ).join('')}</div>`;

  for (const [wsId, meta] of Object.entries(WS_META)) {
    const wsTasks = TASKS.filter(t => t.ws === wsId);
    const filtered = wsTasks.filter(t => matchFilter(t, state.wsFilter));
    if (filtered.length === 0 && state.wsFilter !== 'all') continue;

    const done = wsTasks.filter(t => t.done).length;
    const total = wsTasks.length;
    const pct = Math.round((done/total)*100);
    const isOpen = state.openWs[wsId];
    const display = state.wsFilter === 'all' ? wsTasks : filtered;

    const phases = { done:[], now:[], next:[], scale:[] };
    display.forEach(t => { if(phases[t.phase]) phases[t.phase].push(t); });

    let body = '';
    for (const [ph, items] of Object.entries(phases)) {
      if (!items.length) continue;
      body += `<div class="phase-hdr">${PHASE_LABELS[ph]}</div>`;
      body += items.map(t => `
        <div class="task-row">
          <div class="t-check ${t.done?'done':''}" role="checkbox" aria-checked="${t.done}" tabindex="0" onclick="togglePlan('${t.id}')" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();togglePlan('${t.id}')}"></div>
          <div class="t-content">
            <div class="t-name ${t.done?'done':''}">${t.name}</div>
            ${t.detail?`<div class="t-detail">${t.detail}</div>`:''}
            <div class="t-tags">
              ${t.impact.map(i=>IMPACT_LABELS[i]?`<span class="impact-tag ${IMPACT_LABELS[i].cls}">${IMPACT_LABELS[i].label}</span>`:'').join('')}
              ${t.tags.filter(x=>x!=='done').map(tag=>`<span class="tag tag-${tag}">${tag.replace(/-/g,' ')}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    html += `
      <div class="ws-section">
        <div class="ws-head" onclick="toggleWsPlan('${wsId}')">
          <div class="ws-left"><span class="ws-icon">${meta.icon}</span><span class="ws-title">${meta.title}</span></div>
          <div class="ws-right"><div class="pbar"><div class="pfill" style="width:${pct}%;background:${meta.color}"></div></div><span>${done}/${total}</span><span class="chev ${isOpen?'open':''}">\u25B6</span></div>
        </div>
        ${isOpen?`<div class="ws-body">${body}</div>`:''}
      </div>
    `;
  }
  el.innerHTML = html;
}

function matchFilter(t, f) {
  if (f==='all') return true;
  if (f==='todo') return !t.done;
  if (f==='done') return t.done;
  return t.tags.includes(f) && !t.done;
}

function setWsFilter(f) { state.wsFilter = f; save(); render(); }
function toggleWsPlan(id) { state.openWs[id] = !state.openWs[id]; save(); render(); }
function togglePlan(id) {
  const t = TASKS.find(x=>x.id===id);
  t.done = !t.done;
  if (t.done) markStreakToday();
  save(); render();
}

// PARKING LOT
function renderParking(el) {
  el.innerHTML = `
    <div class="parking-lot">
      <div class="pl-title">\uD83C\uDFAF Shiny Object Parking Lot</div>
      <div class="pl-subtitle">Had a new idea? Park it here instead of acting on it. Review weekly \u2014 if it still matters after 7 days, promote it to the plan.</div>
      <div class="pl-input-row">
        <input class="pl-input" id="plInput" placeholder="Park a new idea here..." onkeydown="if(event.key==='Enter')addParking()">
        <button class="pl-add-btn" onclick="addParking()">Park it</button>
      </div>
      <div id="plList">
        ${state.parkingLot.length === 0 ? '<div class="pl-empty">Nothing parked. Good focus.</div>' :
          state.parkingLot.map((item, i) => `
            <div class="pl-item">
              <span>${item.text}</span>
              <span class="pl-date">${item.date}</span>
              <span class="pl-remove" onclick="removeParking(${i})">\u2715</span>
            </div>
          `).join('')
        }
      </div>
    </div>
    <div class="needle-question" style="margin-top:16px">
      <strong>Weekly review ritual (every Sunday, 15 mins):</strong><br>
      1. Review parked ideas \u2014 delete or promote to plan<br>
      2. Check streak \u2014 did you show up every day?<br>
      3. Pick your top 3 focus tasks for Monday<br>
      4. Ask: "Am I closer to 20 students this month?"
    </div>
  `;
}

function addParking() {
  const input = document.getElementById('plInput');
  const text = input.value.trim();
  if (!text) return;
  state.parkingLot.push({ text, date: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short'}) });
  input.value = '';
  save(); render();
}

function removeParking(i) {
  state.parkingLot.splice(i, 1);
  save(); render();
}

// THEME
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('cas_theme', theme); } catch(e) {}
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'light' ? 'dark' : 'light');
  renderTabs();
}

// INIT
try {
  const savedTheme = localStorage.getItem('cas_theme');
  applyTheme(savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
} catch(e) {
  applyTheme('dark');
}
load();
render();
</script>
